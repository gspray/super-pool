; ─────────────────────────────────────────────────────────────────────────────
; PlatformIO project configuration — ESP32 Sprinkler Controller
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32dev

; ── Common settings shared by all envs ───────────────────────────────────────
[env]
framework      = arduino
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── Generic ESP32 DevKit (most breakout boards) ───────────────────────────────
[env:esp32dev]
platform                 = espressif32
board                    = esp32-c3-devkitm-1
board_build.filesystem   = littlefs
upload_port              = COM5
monitor_port             = COM5

; ── ESP32-S3 DevKit (change env if you have an S3) ───────────────────────────
[env:esp32-s3]
platform = espressif32
board    = esp32-s3-devkitc-1
