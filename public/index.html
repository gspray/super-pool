<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f6cbd" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Sprinkler</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <header class="app-header">
        <div class="header-inner">
            <span id="app-title" class="app-title">💧 Sprinkler</span>
            <span id="esp-clock" class="esp-clock" title="ESP32 local time"></span>
            <div class="header-actions">
                <span id="battery-indicator" class="battery-indicator hidden" title="Battery"></span>
                <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
            </div>
        </div>
    </header>

    <main id="main">
        <!-- Populated by app.js -->
        <div class="loading">Loading controllers…</div>
    </main>

    <!-- ── Settings modal ─────────────────────────────────────── -->
    <div id="modal-backdrop" class="modal-backdrop hidden">
        <div class="modal" role="dialog" aria-modal="true">
            <h2 id="modal-title">Settings</h2>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
                <button id="modal-confirm" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>

</html>
